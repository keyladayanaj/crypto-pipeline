services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cryptodb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cryptodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  app:
    build: .
    command: python src/scheduler.py
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/cryptodb
      COINGECKO_API_URL: https://api.coingecko.com/api/v3
      TOP_N_COINS: 20
      COLLECT_INTERVAL_HOURS: 1
      ALERT_THRESHOLD_PCT: 5.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/cryptodb
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
